name: BackendCheck

on:
    push:
        paths:
          - 'backend/**'
    pull_request:
        paths:
          - 'backend/**'


jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13.2
        uses: actions/setup-python@v4
        with:
          python-version: 3.13.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev
      
      - name: Lint with ruff
        working-directory: backend
        run: uv run ruff check src
      
      - name: Type check with mypy
        working-directory: backend
        run: uv run mypy src

  tests:
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      SECRET_KEY: "Secret"
      API_ORIGINS: '["*"]'
      DB_HOST: localhost
      DB_PORT: 27017
      DB_TEST_NAME: test_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13.2
        uses: actions/setup-python@v4
        with:
          python-version: 3.13.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Run tests
        working-directory: backend
        run: uv run pytest tests || [ $? -eq 5 ]
