services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - notes-dev
    container_name: mongo-dev
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-notes-dev
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mongodb
    volumes:
      - ./backend:/app
      - backend_venv:/opt/venv
    networks:
      - notes-dev
    depends_on:
      mongodb:
        condition: service_healthy
    command: sh -c "
      uvicorn src.app:app --reload --host 0.0.0.0 --port 8000 --loop uvloop"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-notes-dev
    env_file:
      - ./frontend/.env
    environment:
      - BASE_API_URL=localhost
    volumes:
      - ./frontend/app:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - notes-dev
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

  nginx-notes-dev:
    container_name: nginx-notes-dev
    image: nginx:alpine
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
      - ./backend/media:/usr/share/nginx/media:ro
    networks:
      - notes-dev
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
  backend_venv:
  frontend_node_modules:

networks:
  notes-dev:
    driver: bridge
