events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Определяем формат логов
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main;

    # Основные настройки
    sendfile on;
    server_tokens off;
    client_max_body_size 3M;

    client_header_timeout 10s;
    client_body_timeout 15s;
    keepalive_timeout 10s;
    send_timeout 10s;

    # Конфигурация сжатия
    gzip on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types application/json;
    gzip_vary on;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # Общие заголовки безопасности
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Проксирование API запросов на бэкенд
        location ~ ^/(api/v1|docs) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Обработка preflight запросов
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # Статические ассеты Vite
        location /assets/ {
            proxy_pass http://frontend/assets/;
            proxy_set_header Host $host;
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }

        # Images
        location /images/ {
            proxy_pass http://frontend/images/;
            proxy_set_header Host $host;
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }

        # Media files
        location /media/ {
            alias /backend/media/;
            expires 1h;
            add_header Cache-Control "public, no-transform";

            access_log /var/log/nginx/media-access.log combined buffer=32k flush=5s;
            error_log /var/log/nginx/media-error.log debug;

            try_files $uri $uri/ =404;

            add_header X-Debug-Path $request_filename;
            add_header X-Debug-Uri $uri;
        }

        # Favicon и статические файлы в корне
        location /favicon.ico {
            proxy_pass http://frontend/favicon.ico;
            expires 1y;
        }

        location /robots.txt {
            proxy_pass http://frontend/robots.txt;
            expires 1y;
        }

        # Специальный location для Vite WebSocket
        location /@vite/client {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        location /hmr/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # WebSocket соединение для HMR
        location /ws {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        # Обработка Vite dev сервера и HMR
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_buffering off;
        }

        # Специальная обработка для Vite HMR
        location ~* ^/@(?:id|vite|fs)/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        # Обработка исходных файлов
        location ~* \.(ts|js|jsx|tsx|vue)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        # Обработка source maps
        location ~* \.js\.map$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires -1;
            add_header Cache-Control no-store;
        }
    }
}
